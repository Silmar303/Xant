<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xant-Ω</title>

    <!-- Polices Eunomia & Xolonium -->
    <link href="https://fonts.cdnfonts.com/css/eunomia" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/xolonium" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0f;
            color: white;
            font-family: 'Xolonium', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout 3 colonnes pleine hauteur */
        .layout {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            height: 100vh;
        }

        /* Colonnes latérales */
        .column {
            position: relative;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .column.left {
            border-right: 4px solid #9F81BA;
        }

        .column.right {
            border-left: 4px solid #9F81BA;
        }

        .column img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* Colonne centrale avec illustration en fond */
        .center-box {
            position: relative;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;

            /* Illustration centrale en fond */
            background-image: url('Images/illustration_centre.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Contenu au-dessus du fond */
        .center-box * {
            position: relative;
            z-index: 2;
        }

        /* Titre */
        .center-box h1 {
            font-family: 'Eunomia', sans-serif;
            font-size: 150px;
            margin: 0;
            text-align: center;
			text-shadow:
				-3px -3px 0 #000,
				3px -3px 0 #000,
				-3px  3px 0 #000,
				3px  3px 0 #000;
        }

        /* Boutons */
        .btn {
            padding: 35px 20px;
            background: #25204C;
            border: 2px solid #9F81BA;
            color: white;
            text-decoration: none;
            font-size: 22px;
            border-radius: 10px;
            transition: 0.25s;
            width: 260px;
            text-align: center;
        }

        .btn:hover {
            background: #9F81BA;
            color: black;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .column.left,
            .column.right {
                display: none;
            }
            body {
                overflow-y: auto;
            }
        }
    </style>
</head>

<body>

    <div class="layout">

        <!-- Colonne gauche -->
        <div class="column left">
            <img src="Images/illustration_gauche.png" alt="Illustration gauche">
        </div>

        <!-- Colonne centrale -->
        <div class="center-box">

            <h1>Xant-Ω</h1>

            <a class="btn" href="https://drive.google.com/file/d/1ilBt6LYfUR6WrXWyt7UL70WqW7MeRSiv/view?usp=sharing" target="_blank">
                Livret de règles
            </a>

            <a class="btn" href="https://drive.google.com/file/d/1x0374FFBMjbLEzuOQiSXSrITtPsIV8Op/view?usp=sharing" target="_blank">
                Scénarios et variantes
            </a>

            <a class="btn" href="Aides_de_jeu.html">
                Aides de jeu
            </a>

            <a class="btn" href="Remerciements.html">
                Remerciements
            </a>

        </div>

        <!-- Colonne droite -->
        <div class="column right">
            <img src="Images/illustration_droite.png" alt="Illustration droite">
        </div>

    </div>

</body>
</html>
