<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xant-Ω</title>

    <!-- Polices Eunomia & Xolonium -->
    <link href="https://fonts.cdnfonts.com/css/eunomia" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/xolonium" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0f;
            color: white;
            font-family: 'Xolonium', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Layout 3 colonnes pleine hauteur */
        .layout {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            height: 100vh;
        }

        /* Colonnes latérales */
        .column {
            position: relative;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .column.left {
            border-right: 4px solid #9F81BA;
        }

        .column.right {
            border-left: 4px solid #9F81BA;
        }

        .column img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* Colonne centrale avec illustration en fond */
        .center-box {
            position: relative;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;

            /* Illustration centrale en fond */
            background-image: url('Images/Illustration_centre.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Contenu au-dessus du fond */
        .center-box * {
            position: relative;
            z-index: 2;
        }

        /* Titre */
        .center-box h1 {
            font-family: 'Eunomia', sans-serif;
            font-size: 150px;
            margin: 0;
            text-align: center;
			text-shadow:
				-3px -3px 0 #000,
				3px -3px 0 #000,
				-3px  3px 0 #000,
				3px  3px 0 #000;
        }

        /* Boutons */

		.center-box .btn:nth-of-type(2) {
		    margin-top: 15px;   /* bouton "Iconodex" */
			}
			
        .btn {
            padding: 25px 25px;
            background: #25204C;
            border: 2px solid #9F81BA;
            color: white;
            text-decoration: none;
            font-size: 22px;
            border-radius: 10px;
            transition: 0.25s;
            width: 260px;
            text-align: center;
        }

        .btn:hover {
            background: #9F81BA;
            color: black;
        }

		.small-link {
		    margin-top: -25px;   /* rapproche le lien du bouton */
		    margin-bottom: -5px; /* rapproche le lien du bouton */
		    text-align: center;
		}

		.small-link a {
		    font-size: 14px;
		    color: #25204C;
		    text-decoration: none;
		}
	
		.small-link a:hover {
		    color: #9F81BA;
		    text-decoration: underline;
		}
		
        /* Responsive */
        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .column.left,
            .column.right {
                display: none;
            }
            body {
                overflow-y: auto;
            }
			.center-box h1 {
        		font-size: 80px;   /* taille adaptée pour éviter le retour à la ligne */
        }
    </style>
</head>

<body>

    <div class="layout">

        <!-- Colonne gauche -->
        <div class="column left">
            <img src="Images/Aides_de_jeu_gauche.png" alt="Illustration gauche">
        </div>

        <!-- Colonne centrale -->
		<div class="center-box">

			<h1>Aides de jeu</h1>

			<a class="btn" href="https://drive.google.com/file/d/1VZ3cJ8bo73seKjZXT8wJq3OTiPbR8dCc/view?usp=sharing" target="_blank">
			Dépliant
			</a>
			
			<div class="small-link">
      			<a href="https://drive.google.com/file/d/1n7Y_GqdVnh0W3_LsjFGFcIkoHF7qzaxQ/view?usp=sharing" target="_blank">Version haute qualité</a>
   			</div>
			
			<a class="btn" href="https://drive.google.com/file/d/1KvOQDyxg9FpOJU97kxE-s6rwOfbZzr5G/view?usp=sharing" target="_blank">
			Iconodex
			</a>
			
			<a class="btn" href="https://drive.google.com/file/d/1LQDv6rdh9AOCqwKeTku0wVyjA0KAYeeH/view?usp=sharing">
			Tour de jeu
			</a>

		</div>

        <!-- Colonne droite -->
        <div class="column right">
            <img src="Images/Aides_de_jeu_droite.png" alt="Illustration droite">
        </div>

    </div>

</body>
</html>
